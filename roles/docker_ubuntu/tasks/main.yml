- name: Install Python for Ansible
  ansible.builtin.raw: apt update && apt install python3 -y
  changed_when: true

- name: Install misc packages for Ansible
  ansible.builtin.apt:
    name:
      - apt-utils
      - build-essential
      - curl
      - git
      - sudo
      - unminimize
    state: latest

- name: Execute command 'unminimize'
  ansible.builtin.shell:
    cmd: yes | unminimize
  changed_when: true

- name: Set password for user root
  ansible.builtin.user:
    name: root
    password: "{{ user_password }}"

- name: Add user {{ user_name }} with primary group {{ user_group }}
  ansible.builtin.user:
    name: "{{ user_name }}"
    group: "{{ user_group }}"
    groups: "{{ user_groups }}"
    shell: "{{ user_shell }}"
    password: "{{ user_password }}"

- name: Create file /etc/sudoers.d/custom
  ansible.builtin.template:
    src: sudoers.d/custom.j2
    dest: /etc/sudoers.d/custom
    owner: root
    group: root
    mode: "0640"
  become: true

- name: Re-add Docker container {{ docker_base }} to Ansible hosts inventory
  ansible.builtin.add_host:
    name: "{{ docker_base }}"
    ansible_connection: docker
    ansible_ssh_user: "{{ user_name }}"
